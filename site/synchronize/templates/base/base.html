<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    {% load static %}
    <link rel="icon" href="{% static 'images/icon.png' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <title>{{ page_name }}</title>
    <script>
      (function() {
        var m = localStorage.getItem('sync-mode') || 'dark';
        var t = localStorage.getItem('sync-theme') || 'default';
        document.documentElement.setAttribute('data-preload-mode', m);
        document.documentElement.setAttribute('data-preload-theme', t);
      })();
    </script>
  </head>
  <body class="container black text" id="bd" data-mode="dark" data-theme="default" data-bs-theme="dark">
    <header>
      {% include 'base/menu.html' %}
    </header>
    <main>
      {% block main %}{% endblock %}
    </main>
    <footer class="ftw">
      <div class="footer-inner">
        <div class="footer-brand">Synchronize</div>
        <div class="footer-links">
          <a href="https://github.com/GQuadro-star/synchronize" target="_blank" rel="noopener" class="footer-link">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                       0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                       -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                       .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                       -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                       .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                       .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                       0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
          <a href="mailto:synchronize_proj@proton.me" class="footer-link">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            synchronize_proj@proton.me
          </a>
        </div>
        <div class="footer-copy">© 2025 Synchronize. Все права защищены.</div>
      </div>
    </footer>
    <script>
      var body = document.getElementById("bd");
      var lamp = document.getElementById("light");

      function light() {
        var isLight = body.getAttribute('data-mode') === 'light';
        if (isLight) {
          body.setAttribute('data-mode', 'dark');
          body.setAttribute('data-bs-theme', 'dark');
          body.classList.replace('white', 'black');
          lamp.classList.replace('off', 'on');
          localStorage.setItem('sync-mode', 'dark');
        } else {
          body.setAttribute('data-mode', 'light');
          body.setAttribute('data-bs-theme', 'light');
          body.classList.replace('black', 'white');
          lamp.classList.replace('on', 'off');
          localStorage.setItem('sync-mode', 'light');
        }
      }

      function setTheme(theme) {
        body.setAttribute('data-theme', theme);
        localStorage.setItem('sync-theme', theme);
        document.querySelectorAll('.theme-dot').forEach(function(dot) {
          dot.classList.toggle('active', dot.getAttribute('data-theme') === theme);
        });
      }

      (function() {
        var savedMode  = localStorage.getItem('sync-mode')  || 'dark';
        var savedTheme = localStorage.getItem('sync-theme') || 'default';

        body.setAttribute('data-mode',  savedMode);
        body.setAttribute('data-theme', savedTheme);
        body.setAttribute('data-bs-theme', savedMode);

        if (savedMode === 'light') {
          body.classList.replace('black', 'white');
          lamp.classList.replace('on', 'off');
        }

        document.querySelectorAll('.theme-dot').forEach(function(dot) {
          dot.classList.toggle('active', dot.getAttribute('data-theme') === savedTheme);
        });
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
  </body>
</html>
